[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact-hook-form"
version = "0.0.1"
description = "Form state management for ryact (parity target: react-hook-form)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["ryact"]

[tool.hatch.build.targets.wheel]
packages = ["src/ryact_hook_form"]

