[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact-tailwindcss"
version = "0.0.1"
description = "TailwindCSS-inspired utility classes for ryact renderers."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["ryact", "ryact-dom"]

[tool.hatch.build.targets.wheel]
packages = ["src/ryact_tailwindcss"]

