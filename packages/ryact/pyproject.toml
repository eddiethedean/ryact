[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact"
version = "0.0.2"
description = "Python port of React core (parity target: facebook/react packages/react)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["schedulyr==0.1.0"]

[project.urls]
Repository = "https://github.com/eddiethedean/ryact"
Issues = "https://github.com/eddiethedean/ryact/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/ryact"]

