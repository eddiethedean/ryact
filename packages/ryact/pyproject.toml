[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact"
version = "0.0.1"
description = "Python port of React core (parity target: facebook/react packages/react)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["schedulyr"]

[tool.hatch.build.targets.wheel]
packages = ["src/ryact"]

