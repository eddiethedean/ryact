[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact-dom"
version = "0.0.1"
description = "Python port of react-dom (parity target: facebook/react packages/react-dom)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["ryact"]

[tool.hatch.build.targets.wheel]
packages = ["src/ryact_dom"]

