[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact-pyx"
version = "0.0.1"
description = "Optional PYX (XML-like) compiler layer for ryact (emits h/create_element calls)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["ryact"]

[tool.hatch.build.targets.wheel]
packages = ["src/ryact_pyx"]

