[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact-vite"
version = "0.0.1"
description = "Ryact-friendly browser build CLI (delegates to ryact-build / Rolldown; no Node.js)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["ryact-build>=0.0.1"]

[project.urls]
Repository = "https://github.com/eddiethedean/ryact"
Issues = "https://github.com/eddiethedean/ryact/issues"

[project.scripts]
ryact-vite = "ryact_vite.cli:entrypoint"

[tool.hatch.build.targets.wheel]
packages = ["src/ryact_vite"]

