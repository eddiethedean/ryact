[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact-zod"
version = "0.0.1"
description = "Portable schema validation for ryact (Zod-like; cross-lane friendly)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["ryact"]

[tool.hatch.build.targets.wheel]
packages = ["src/ryact_zod"]

