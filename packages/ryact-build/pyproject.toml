[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact-build"
version = "0.0.1"
description = "Narrow static web build: esbuild for JS/TS/JSX/TSX bundles + optional PYX→Python compile."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["ryact-pyx"]

[project.urls]
Repository = "https://github.com/eddiethedean/ryact"
Issues = "https://github.com/eddiethedean/ryact/issues"

[project.scripts]
ryact-build = "ryact_build.cli:entrypoint"

[tool.hatch.build.targets.wheel]
packages = ["src/ryact_build"]
