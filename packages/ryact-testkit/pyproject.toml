[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "ryact-testkit"
version = "0.0.1"
description = "Internal test harness for ryact parity suite."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
dependencies = ["ryact", "ryact-dom", "pytest"]

[tool.hatch.build.targets.wheel]
packages = ["src/ryact_testkit"]

