name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/schedulyr -e packages/ryact -e packages/ryact-dom -e packages/ryact-native -e packages/ryact-testkit
          python -m pip install pytest ruff mypy coverage
          npm ci

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (mypy)
        run: mypy packages/schedulyr/src packages/ryact/src packages/ryact-dom/src packages/ryact-native/src packages/ryact-testkit/src

      - name: Test (pytest)
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest

  scheduler_upstream_drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Shallow clone facebook/react
        run: |
          git clone --depth 1 --branch main https://github.com/facebook/react.git /tmp/react-upstream

      - name: Scheduler inventory drift
        run: python scripts/check_scheduler_upstream_inventory.py /tmp/react-upstream

